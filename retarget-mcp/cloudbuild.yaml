steps:
  # 1. Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/retarget-mcp', '.']
    id: 'build-image'

  # 2. Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/retarget-mcp']
    id: 'push-image'

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - run
      - --filename=.
      - --image=gcr.io/$PROJECT_ID/retarget-mcp
      - --location=us-central1
      - --cluster=retarget-mcp
    id: 'deploy-cloud-run'

images:
  - 'gcr.io/$PROJECT_ID/retarget-mcp'

options:
  machineType: 'N1_HIGHCPU_8'

timeout: '3600s'
