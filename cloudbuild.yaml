steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/cms-news-ai:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/cms-news-ai:latest'
      - '.'
    id: 'build-image'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/cms-news-ai:$COMMIT_SHA']
    id: 'push-image-sha'
    waitFor: ['build-image']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/cms-news-ai:latest']
    id: 'push-image-latest'
    waitFor: ['build-image']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'cms-news-ai'
      - '--image=gcr.io/$PROJECT_ID/cms-news-ai:$COMMIT_SHA'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--timeout=300'
      - '--set-env-vars=NODE_ENV=production,SITE_PROFILE=news-ai,PORT=3000'
      - '--update-secrets=DATABASE_URL=cms-news-database-url:latest,PAYLOAD_SECRET=cms-news-payload-secret:latest'
    id: 'deploy-cloud-run'
    waitFor: ['push-image-sha']

images:
  - 'gcr.io/$PROJECT_ID/cms-news-ai:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/cms-news-ai:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
