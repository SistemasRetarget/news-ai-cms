name: SEO Campaign Monitor

on:
  schedule:
    - cron: '0 12 * * 1-5'  # 8am hora Chile (UTC-4, invierno)
  workflow_dispatch:          # trigger manual desde GitHub UI

jobs:
  seo-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install google-auth google-auth-httplib2 google-api-python-client

      - name: Install Node.js + Lighthouse
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Lighthouse
        run: npm install -g lighthouse

      - name: Write GCP credentials
        run: echo '${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}' > /tmp/gcp-credentials.json

      - name: Run SEO Campaign Monitor
        env:
          GCP_CREDENTIALS_FILE: /tmp/gcp-credentials.json
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: bash scripts/run-all-campaigns.sh

      - name: Upload reports as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-reports-${{ github.run_id }}
          path: /tmp/seo-reports/
          retention-days: 30
